{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    
                    <h2 class="card-title">{{ t('login_title') }}</h2>
                </div>
                
                <form method="POST" action="{{ url_for('index') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('alias_label') }}</label>
                        <input type="text" name="alias" class="form-control form-control-lg" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                        <i class="fas fa-sign-in-alt"></i> {{ t('login_btn') }}
                    </button>
                </form>

                <div class="text-center">
                    <div class="text-muted mb-3">— {{ t('or') if t('or') else 'or' }} —</div>
                    <form method="POST" action="{{ url_for('guest') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-outline-secondary w-100">
                            <i class="fas fa-user-secret"></i> {{ t('guest_btn') }}
                        </button>
                    </form>
                </div>

                <div class="mt-4">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i> {{ t('privacy_notice') }}
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
